{{define "login"}}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        body > main {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <main class="container">
        <article class="login-card">
            <header>
                <hgroup>
                    <h1>Admin Console</h1>
                    <p>Sign in to your account</p>
                </hgroup>
            </header>
            <form method="post" action="/auth/login">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" aria-label="Email" autocomplete="email" required>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" aria-label="Password" autocomplete="current-password" required>
                <button type="submit" class="contrast">Login</button>
            </form>
            <footer>
                <small>Modern interface with Pico CSS</small>
            </footer>
        </article>
    </main>
</body>
</html>
{{end}}
